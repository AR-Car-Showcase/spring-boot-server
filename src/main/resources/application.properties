spring.application.name=AR-car-showcase-server
server.port=8080
server.address=0.0.0.0

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/car_data}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Security
security.auth-mode=INTERNAL
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=3600000
security.jwt.refresh-expiration-ms=604800000
security.jwt.issuer=ar-car-showcase-server
security.refresh.store-mode=${SECURITY_REFRESH_STORE_MODE:INMEMORY}
security.refresh.redis.key-prefix=${SECURITY_REFRESH_REDIS_KEY_PREFIX:security:refresh}
security.google.enabled=${SECURITY_GOOGLE_ENABLED:false}
security.google.client-id=${SECURITY_GOOGLE_CLIENT_ID:}
security.google.issuer-uri=${SECURITY_GOOGLE_ISSUER_URI:https://accounts.google.com}
security.google.auto-link-by-email=${SECURITY_GOOGLE_AUTO_LINK_BY_EMAIL:true}
security.public-endpoints=/api/auth/signup,/api/auth/verify-email,/api/auth/resend-verification,/api/auth/google/config,/login/google,/api/models/**,/api/static/models/**,/api/cars/allcars,/api/cars/allBrands,/api/cars/car/**,/api/cars/options,/api/cars/body-type/**,/api/cars/brand/**,/api/cars/fuel-type/**,/api/cars/transmission-type/**,/api/cars/rating/**,/api/cars/pricing/**,/api/cars/recommendations/*,/api/cars/*/models,/api/cars/*/*/variants,/api/cars/*/*/*,/api/cars/*/details/**,/api/search/cars/**,/api/carvariants/**,/security-test.html,/security-test.js,/security-test.css
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8081}

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${SPRING_DATA_REDIS_SSL_ENABLED:false}

# Signup email verification
app.signup.verification.enabled=${APP_SIGNUP_VERIFICATION_ENABLED:true}
app.signup.verification.otp-length=${APP_SIGNUP_VERIFICATION_OTP_LENGTH:6}
app.signup.verification.otp-ttl-minutes=${APP_SIGNUP_VERIFICATION_OTP_TTL_MINUTES:10}
app.signup.verification.resend-cooldown-seconds=${APP_SIGNUP_VERIFICATION_RESEND_COOLDOWN_SECONDS:60}
app.signup.verification.max-attempts=${APP_SIGNUP_VERIFICATION_MAX_ATTEMPTS:5}
app.signup.verification.store-mode=${APP_SIGNUP_VERIFICATION_STORE_MODE:INMEMORY}
app.signup.verification.redis.key-prefix=${APP_SIGNUP_VERIFICATION_REDIS_KEY_PREFIX:security:signup-verification}
app.signup.verification.smtp-enabled=${APP_SIGNUP_VERIFICATION_SMTP_ENABLED:false}
app.signup.verification.from-address=${APP_SIGNUP_VERIFICATION_FROM_ADDRESS:no-reply@arcarshowcase.local}
app.signup.disposable-email-domains=${APP_SIGNUP_DISPOSABLE_EMAIL_DOMAINS:mailinator.com,10minutemail.com,tempmail.com,yopmail.com,guerrillamail.com,trashmail.com,throwawaymail.com,fakemail.net,maildrop.cc,dispostable.com,sharklasers.com,moakt.com,fakeinbox.com,mailnesia.com,temp-mail.org,mail.tm,getnada.com}
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

# Rate limiting
app.rate-limit.enabled=${APP_RATE_LIMIT_ENABLED:true}
app.rate-limit.general.capacity=${APP_RATE_LIMIT_GENERAL_CAPACITY:120}
app.rate-limit.general.refill-per-minute=${APP_RATE_LIMIT_GENERAL_REFILL_PER_MINUTE:120}
app.rate-limit.auth.capacity=${APP_RATE_LIMIT_AUTH_CAPACITY:6}
app.rate-limit.auth.refill-per-minute=${APP_RATE_LIMIT_AUTH_REFILL_PER_MINUTE:6}
app.rate-limit.expensive.capacity=${APP_RATE_LIMIT_EXPENSIVE_CAPACITY:12}
app.rate-limit.expensive.refill-per-minute=${APP_RATE_LIMIT_EXPENSIVE_REFILL_PER_MINUTE:12}

# Blender Service
blender.service.url=${BLENDER_SERVICE_URL:http://localhost:5000}


# ML Recommendation Service
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}
ml.service.key=${ML_SERVICE_KEY:carshowcase_internal_2026}

spring.ai.openai.base-url=${GROQ_BASE_URL:https://api.groq.com/openai}
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.chat.options.model=${GROQ_MODEL:qwen/qwen3-32b}
spring.ai.openai.chat.options.temperature=0.2

