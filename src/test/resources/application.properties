spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/car_data}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

jwt.secret=test-secret-for-context-loads-only
jwt.expiration=86400000

blender.service.url=http://localhost:5000
ml.service.url=http://localhost:8000
ml.service.key=test-ml-key

spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.api-key=test-api-key
spring.ai.openai.chat.options.model=qwen/qwen3-32b
